apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kiramopay-ingress
  namespace: kiramopay
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/websocket-services: "kiramopay-api"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - kiramopay.local
      secretName: kiramopay-tls
  rules:
    - host: kiramopay.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: kiramopay-api
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: kiramopay-api
                port:
                  number: 8080
          - path: /health
            pathType: Exact
            backend:
              service:
                name: kiramopay-api
                port:
                  number: 8080
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: kiramopay-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kiramopay-web
                port:
                  number: 80
