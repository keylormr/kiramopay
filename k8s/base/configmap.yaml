apiVersion: v1
kind: ConfigMap
metadata:
  name: kiramopay-config
  namespace: kiramopay
data:
  ENVIRONMENT: "development"
  SERVER_PORT: "8080"
  DB_HOST: "pgbouncer"  # Route through PgBouncer for connection pooling
  DB_PORT: "5432"
  DB_NAME: "kiramopay"
  DB_SSL_MODE: "disable"
  DB_MAX_CONNS: "25"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  JWT_ACCESS_MINUTES: "15"
  JWT_REFRESH_DAYS: "7"
