apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiramopay-api
  namespace: kiramopay
  labels:
    app: kiramopay-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kiramopay-api
  template:
    metadata:
      labels:
        app: kiramopay-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: kiramopay-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: kiramopay-config
            - secretRef:
                name: kiramopay-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: kiramopay-api
  namespace: kiramopay
  labels:
    app: kiramopay-api
spec:
  selector:
    app: kiramopay-api
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kiramopay-api-hpa
  namespace: kiramopay
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kiramopay-api
  minReplicas: 2
  maxReplicas: 10
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
