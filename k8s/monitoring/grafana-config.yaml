apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: kiramopay
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: kiramopay
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-kiramopay
  namespace: kiramopay
data:
  kiramopay.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Total HTTP Requests",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "kiramopay_http_requests_total",
              "legendFormat": "Total Requests"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1000 },
                  { "color": "red", "value": 10000 }
                ]
              }
            }
          }
        },
        {
          "title": "HTTP Errors (5xx)",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "kiramopay_http_errors_total",
              "legendFormat": "5xx Errors"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "title": "Uptime (seconds)",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "kiramopay_uptime_seconds",
              "legendFormat": "Uptime"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            }
          }
        },
        {
          "title": "WebSocket Clients",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "expr": "kiramopay_go_goroutines",
              "legendFormat": "Goroutines"
            }
          ]
        },
        {
          "title": "Go Heap Memory",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "targets": [
            {
              "expr": "kiramopay_go_heap_alloc_bytes",
              "legendFormat": "Heap Alloc"
            },
            {
              "expr": "kiramopay_go_heap_sys_bytes",
              "legendFormat": "Heap Sys"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          }
        },
        {
          "title": "Goroutines",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "targets": [
            {
              "expr": "kiramopay_go_goroutines",
              "legendFormat": "Goroutines"
            }
          ]
        },
        {
          "title": "GC Cycles",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "targets": [
            {
              "expr": "kiramopay_go_gc_total",
              "legendFormat": "Total GC"
            }
          ]
        },
        {
          "title": "Request Duration Avg (ms)",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "targets": [
            {
              "expr": "kiramopay_http_request_duration_ms_avg",
              "legendFormat": "{{method}} {{path}}",
              "format": "table",
              "instant": true
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["kiramopay"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "KiramoPay Dashboard",
      "uid": "kiramopay-main"
    }
