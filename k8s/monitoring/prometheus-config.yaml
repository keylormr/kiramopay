apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: kiramopay
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'kiramopay-api'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - kiramopay
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: app

      # Fallback: scrape API service directly
      - job_name: 'kiramopay-api-service'
        static_configs:
          - targets: ['kiramopay-api:8080']
        metrics_path: /metrics
        scrape_interval: 10s
