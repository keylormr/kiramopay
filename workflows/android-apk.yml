name: Android APK

# Builds the signed Android APK on GitHub's runners (no local Android toolchain
# needed) and publishes it to a GitHub Release. The website's "Download Android
# app" button links to the latest release asset (kiramopay.apk).
#
# Release: push a tag like `v2.0.1` -> the APK is attached to that release.
# Manual: run this workflow from the Actions tab -> produces a downloadable
# artifact (no release) for testing.
#
# Requires these repo secrets (Settings > Secrets and variables > Actions):
#   ANDROID_KEYSTORE_BASE64     base64 of the release keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD   keystore password
#   ANDROID_KEY_ALIAS           key alias
#   ANDROID_KEY_PASSWORD        key password
# And optionally the repo variable APK_API_URL (defaults to https://kiramopay.com)
# = the absolute backend URL baked into the APK. See docs/ANDROID_APK.md.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build web bundle
        env:
          # The APK loads local assets, so it needs an ABSOLUTE backend URL (the
          # vercel.json /api proxy does not apply inside the app).
          VITE_API_URL: ${{ vars.APK_API_URL || 'https://kiramopay.com' }}
          VITE_ANDROID_APK_URL: 'https://github.com/keylormr/kiramopay/releases/latest/download/kiramopay.apk'
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Decode signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::Missing secret ANDROID_KEYSTORE_BASE64. Add the base64 of your release keystore (see docs/ANDROID_APK.md)."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/kiramopay-release.jks"

      - name: Build signed release APK
        working-directory: android
        env:
          KIRAMOPAY_KEYSTORE_FILE: ${{ runner.temp }}/kiramopay-release.jks
          KIRAMOPAY_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KIRAMOPAY_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KIRAMOPAY_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Stage APK
        run: cp android/app/build/outputs/apk/release/app-release.apk kiramopay.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kiramopay-apk
          path: kiramopay.apk
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: kiramopay.apk
          fail_on_unmatched_files: true
