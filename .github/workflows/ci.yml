name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Frontend ─────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  frontend-typecheck:
    name: Frontend Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  frontend-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:run

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  frontend-bundle-check:
    name: Frontend Bundle Size Check
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - name: Check bundle sizes
        run: |
          echo "Checking bundle sizes (max 200KB per chunk)..."
          MAX_SIZE=204800
          FAILED=0
          for file in dist/assets/*.js; do
            SIZE=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file")
            SIZE_KB=$((SIZE / 1024))
            FILENAME=$(basename "$file")
            if [ "$SIZE" -gt "$MAX_SIZE" ]; then
              echo "FAIL: $FILENAME is ${SIZE_KB}KB (max 200KB)"
              FAILED=1
            else
              echo "OK: $FILENAME is ${SIZE_KB}KB"
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "Bundle size check failed!"
            exit 1
          fi
          echo "All chunks within size limits."

  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    needs: frontend-build
    # Re-gated: the suite is now deterministic — auth is stubbed at the browser
    # with page.route(), the locale is forced to es-CR, and onboarding is skipped.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Backend ──────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    # Re-gated: pinned golangci-lint + backend/.golangci.yml; the backlog
    # (errcheck/unused/ineffassign/staticcheck) is burned down to zero.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: backend
          version: v2.12.2

  backend-test-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum
      - name: Run unit tests
        working-directory: backend
        run: go test ./pkg/... -v -count=1

  backend-test-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: backend-test-unit
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kiramopay
          POSTGRES_PASSWORD: kiramopay_dev
          POSTGRES_DB: kiramopay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum
      - name: Run integration tests
        working-directory: backend
        env:
          TEST_DB_DSN: postgres://kiramopay:kiramopay_dev@localhost:5432/kiramopay_test?sslmode=disable
          TEST_REDIS_ADDR: localhost:6379
        # -p 1: integration tests share one Postgres with fixed seed IDs, so
        # packages must run serially (parallel packages race on the same rows).
        run: go test ./internal/... -p 1 -count=1 -timeout=300s

      # Gate the real deploy migration path: apply the full chain (RunMigrations)
      # against a fresh DB, exactly as the API does on boot with RUN_MIGRATIONS=true.
      # This is what catches a migration that breaks production before it merges.
      - name: Create migration-chain test database
        env:
          PGPASSWORD: kiramopay_dev
        run: |
          psql -h localhost -U kiramopay -d postgres -v ON_ERROR_STOP=1 \
            -c "DROP DATABASE IF EXISTS kiramopay_migtest;" \
            -c "CREATE DATABASE kiramopay_migtest;"
          # Migration 024 reads the PII encryption key from this database-level
          # GUC (>=32 chars). Setting it mirrors the production prerequisite so
          # the chain — including the 024 PII backfill — runs as it does on deploy.
          psql -h localhost -U kiramopay -d postgres -v ON_ERROR_STOP=1 \
            -c "ALTER DATABASE kiramopay_migtest SET kiramopay.encryption_key = 'kiramopay-ci-migtest-encryption-key-deadbeefcafe';"

      - name: Validate full migration chain (RunMigrations + idempotency)
        working-directory: backend
        env:
          MIGTEST_DSN: postgres://kiramopay:kiramopay_dev@localhost:5432/kiramopay_migtest?sslmode=disable
        run: go test ./internal/database/ -run TestRunAllMigrations -count=1 -v

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum
      - name: Build binary
        working-directory: backend
        run: go build -o bin/api ./cmd/api
      - uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: backend/bin/api
          retention-days: 7

  # ── Security scanning ────────────────────────────────────────────────
  backend-vulncheck:
    name: Backend Vulnerability Scan (govulncheck)
    runs-on: ubuntu-latest
    # Re-gated: dependency advisories bumped (jwt v5.2.2, go-redis v9.7.3) and
    # the Go toolchain pinned to go1.25.11 (go.mod) clears the stdlib advisories.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum
      - name: Install govulncheck
        # Pinned for reproducible runs; bump deliberately. The advisory database
        # is fetched at scan time, so a pinned binary still checks current CVEs.
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.4.0
      - name: Run govulncheck
        # Gating. govulncheck only reports vulnerabilities that are actually
        # reachable from our code, so there is no allowlist to maintain: triage
        # by bumping the dependency or refactoring the call path. See the
        # "Security gates y triage" section of CONTRIBUTING.md.
        working-directory: backend
        run: govulncheck ./...

  backend-gosec:
    name: Backend SAST (gosec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum
      - name: Install gosec
        # Pinned for reproducible runs; a floating @latest can ship new rules
        # that break a previously-green PR mid-review. Bump deliberately.
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1
      - name: Run gosec
        working-directory: backend
        # Gating. G404 (math/rand) is globally excluded — our only uses are
        # non-cryptographic jitter / ETAs. Triage a specific finding inline with
        # `#nosec <RULE> -- <justification>`, never by broadening this exclude
        # list. See the "Security gates y triage" section of CONTRIBUTING.md.
        run: gosec -severity=medium -exclude=G404 -exclude-dir=internal/testutil ./...

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend-audit:
    name: Frontend Dependency Audit (npm audit)
    runs-on: ubuntu-latest
    # Re-gated: build-only packages moved to devDependencies; prod tree is clean.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  trivy-fs:
    name: Dependency Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    # Re-gated: HIGH/CRITICAL advisories cleared (pgx v5.9.0, x/crypto v0.35.0,
    # npm prod tree clean); scans go.sum + package-lock with ignore-unfixed.
    # Triage path: a confirmed-but-unactionable CVE is allowlisted in the
    # repo-root .trivyignore (read automatically), each entry justified and
    # dated. See the "Security gates y triage" section of CONTRIBUTING.md.
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '1'

  # ── Docker ───────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        working-directory: backend
        run: docker build -t kiramopay-api:${{ github.sha }} .
      - name: Build frontend Docker image
        run: docker build -t kiramopay-web:${{ github.sha }} .
